<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Android Key Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f1117; color: #e2e8f0;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    background: #1a1d27; border: 1px solid #2d3148; border-radius: 16px;
    padding: 40px; width: 100%; max-width: 580px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #6c63ff, #4facfe);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .logo-text h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; }
  .logo-text p  { font-size: 12px; color: #64748b; margin-top: 2px; }
  .divider { height: 1px; background: #2d3148; margin-bottom: 28px; }
  .field { margin-bottom: 20px; }
  label {
    display: block; font-size: 13px; font-weight: 600; color: #94a3b8;
    margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase;
  }
  input, select {
    width: 100%; background: #0f1117; border: 1px solid #2d3148;
    border-radius: 10px; padding: 12px 16px; font-size: 14px; color: #e2e8f0;
    font-family: inherit; outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus {
    border-color: #6c63ff;
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }
  select option { background: #1a1d27; }
  .expiry-row { display: flex; gap: 10px; align-items: center; }
  .expiry-row select { flex: 0 0 180px; }
  .expiry-row input  { flex: 1; }
  #expiryDate { display: none; }
  .hint { font-size: 11px; color: #475569; margin-top: 6px; }
  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #6c63ff, #4facfe);
    border: none; border-radius: 10px; color: #fff;
    font-size: 15px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.03em; margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover  { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }
  .result-box { margin-top: 28px; display: none; }
  .result-box.visible { display: block; }
  .result-label {
    font-size: 13px; font-weight: 600; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px;
  }
  .key-wrap {
    background: #0f1117; border: 1px solid #2d3148; border-radius: 10px;
    padding: 14px 16px; display: flex; align-items: center; gap: 10px;
  }
  #keyOutput {
    flex: 1; background: transparent; border: none;
    font-family: 'Courier New', monospace; font-size: 13px; color: #7dd3fc;
    word-break: break-all; outline: none; cursor: text; resize: none; line-height: 1.5;
  }
  .copy-btn {
    background: #2d3148; border: none; border-radius: 8px;
    padding: 8px 14px; color: #e2e8f0; font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: background 0.2s;
  }
  .copy-btn:hover  { background: #3d4268; }
  .copy-btn.copied { background: #166534; color: #86efac; }
  .meta {
    margin-top: 12px; padding: 12px 14px;
    background: #0f1117; border: 1px solid #1e3a5f; border-radius: 8px;
    font-size: 12px; color: #64748b; line-height: 1.8;
  }
  .meta span { color: #93c5fd; }
  .error-box {
    margin-top: 16px; padding: 12px 16px;
    background: #2d0a0a; border: 1px solid #7f1d1d;
    border-radius: 8px; color: #fca5a5; font-size: 13px; display: none;
  }
  .error-box.visible { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">&#x1F511;</div>
    <div class="logo-text">
      <h1>Android Key Generator</h1>
      <p>Internal tool — generate activation keys for Android devices</p>
    </div>
  </div>
  <div class="divider"></div>

  <div class="field">
    <label>Device ID</label>
    <input type="text" id="machineId" placeholder="Paste Device ID from the Activation screen…" autocomplete="off" spellcheck="false">
    <p class="hint">Shown on the Activation screen inside the app — tap "Copy Device ID".</p>
  </div>

  <div class="field">
    <label>License Type</label>
    <select id="licenseType">
      <option value="Standard">Standard</option>
      <option value="Premium">Premium</option>
      <option value="Lifetime">Lifetime</option>
      <option value="Trial">Trial</option>
    </select>
  </div>

  <div class="field">
    <label>Expiry</label>
    <div class="expiry-row">
      <select id="expiryMode" onchange="toggleExpiry()">
        <option value="permanent">Permanent (no expiry)</option>
        <option value="date">Expires on date</option>
      </select>
      <input type="date" id="expiryDate">
    </div>
    <p class="hint">Choose Permanent for lifetime licenses, or pick an expiry date for subscriptions.</p>
  </div>

  <button class="btn" onclick="generate()">Generate License Key</button>

  <div class="error-box" id="errorBox"></div>

  <div class="result-box" id="resultBox">
    <div class="result-label">Generated Key</div>
    <div class="key-wrap">
      <textarea id="keyOutput" rows="3" readonly></textarea>
      <button class="copy-btn" id="copyBtn" onclick="copyKey()">Copy</button>
    </div>
    <div class="meta" id="metaBox"></div>
  </div>
</div>

<script>
// ── Pure-JS HMAC-SHA-256 — no Web Crypto API, works in file:// on any browser ──

var SHA256 = (function() {
  var K = [
    0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
  ];

  function rotr(x,n) { return (x>>>n)|(x<<(32-n)); }

  // SHA-256 of a Uint8Array or plain Array of byte values
  function digest(data) {
    var H = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,
             0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];

    // Build padded message
    var msg = [];
    for (var i = 0; i < data.length; i++) msg.push(data[i] & 0xff);
    var bitLen = data.length * 8;
    msg.push(0x80);
    while ((msg.length % 64) !== 56) msg.push(0x00);
    // Append 64-bit big-endian bit length (only lower 32 bits matter for our small messages)
    msg.push(0, 0, 0, 0,
      (bitLen >>> 24) & 0xff,
      (bitLen >>> 16) & 0xff,
      (bitLen >>>  8) & 0xff,
       bitLen         & 0xff);

    // Process each 64-byte block
    for (var blk = 0; blk < msg.length; blk += 64) {
      var w = new Array(64);
      for (var t = 0; t < 16; t++) {
        var o = blk + t * 4;
        w[t] = ((msg[o]<<24)|(msg[o+1]<<16)|(msg[o+2]<<8)|msg[o+3]) >>> 0;
      }
      for (var t = 16; t < 64; t++) {
        var s1 = rotr(w[t-2],17) ^ rotr(w[t-2],19) ^ (w[t-2]>>>10);
        var s0 = rotr(w[t-15],7) ^ rotr(w[t-15],18) ^ (w[t-15]>>>3);
        w[t] = (s1 + w[t-7] + s0 + w[t-16]) >>> 0;
      }
      var a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
      for (var t = 0; t < 64; t++) {
        var S1  = rotr(e,6)^rotr(e,11)^rotr(e,25);
        var ch  = (e&f)^(~e&g);
        var T1  = (h + S1 + ch + K[t] + w[t]) >>> 0;
        var S0  = rotr(a,2)^rotr(a,13)^rotr(a,22);
        var maj = (a&b)^(a&c)^(b&c);
        var T2  = (S0 + maj) >>> 0;
        h=g; g=f; f=e; e=(d+T1)>>>0;
        d=c; c=b; b=a; a=(T1+T2)>>>0;
      }
      H[0]=(H[0]+a)>>>0; H[1]=(H[1]+b)>>>0;
      H[2]=(H[2]+c)>>>0; H[3]=(H[3]+d)>>>0;
      H[4]=(H[4]+e)>>>0; H[5]=(H[5]+f)>>>0;
      H[6]=(H[6]+g)>>>0; H[7]=(H[7]+h)>>>0;
    }

    var out = [];
    for (var i = 0; i < 8; i++) {
      out.push((H[i]>>>24)&0xff,(H[i]>>>16)&0xff,(H[i]>>>8)&0xff,H[i]&0xff);
    }
    return out;
  }

  // UTF-8 encode a JS string → byte array
  function utf8(str) {
    var out = [];
    for (var i = 0; i < str.length; i++) {
      var c = str.charCodeAt(i);
      if (c < 0x80) {
        out.push(c);
      } else if (c < 0x800) {
        out.push(0xc0|(c>>6), 0x80|(c&0x3f));
      } else if (c < 0xd800 || c >= 0xe000) {
        out.push(0xe0|(c>>12), 0x80|((c>>6)&0x3f), 0x80|(c&0x3f));
      } else {
        // surrogate pair
        i++;
        var c2 = str.charCodeAt(i);
        var cp = 0x10000 + ((c&0x3ff)<<10) + (c2&0x3ff);
        out.push(0xf0|(cp>>18), 0x80|((cp>>12)&0x3f), 0x80|((cp>>6)&0x3f), 0x80|(cp&0x3f));
      }
    }
    return out;
  }

  // HMAC-SHA-256(keyStr, msgStr) → byte array
  function hmac(keyStr, msgStr) {
    var blockSize = 64;
    var k = utf8(keyStr);
    if (k.length > blockSize) k = digest(k);
    while (k.length < blockSize) k.push(0);

    var iPad = [], oPad = [];
    for (var i = 0; i < blockSize; i++) {
      iPad.push(k[i] ^ 0x36);
      oPad.push(k[i] ^ 0x5c);
    }

    var innerHash = digest(iPad.concat(utf8(msgStr)));
    return digest(oPad.concat(innerHash));
  }

  // Byte array → standard Base64 string (with +, /, = padding)
  function toBase64(bytes) {
    var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
    var out = '';
    for (var i = 0; i < bytes.length; i += 3) {
      var b0=bytes[i], b1=bytes[i+1]||0, b2=bytes[i+2]||0;
      out += chars[b0>>2];
      out += chars[((b0&3)<<4)|(b1>>4)];
      out += (i+1 < bytes.length) ? chars[((b1&0xf)<<2)|(b2>>6)] : '=';
      out += (i+2 < bytes.length) ? chars[b2&0x3f]               : '=';
    }
    return out;
  }

  return { hmac: hmac, utf8: utf8, toBase64: toBase64 };
})();

// ── License key logic — must match LicenseManager.kt exactly ──────────────────

var HMAC_SECRET = "FASTPOS#2024$SecretKey!XZ9qL7mP";

// Mirrors computeHmac() in LicenseManager.kt:
//   Base64.encodeToString(sig, NO_WRAP).replace("/","A").replace("+","B").replace("=","").substring(0,16)
function computeHmac(payload) {
  var sigBytes = SHA256.hmac(HMAC_SECRET, payload);
  var b64 = SHA256.toBase64(sigBytes);
  return b64.replace(/\//g,'A').replace(/\+/g,'B').replace(/=/g,'').substring(0,16);
}

// Mirrors the key construction used by the key-generator counterpart.
// Payload is encoded as UTF-8 bytes → standard Base64 (no char replacements).
function buildKey(machineId, licenseType, expiry) {
  var payload     = machineId + '|' + licenseType + '|' + expiry;
  var payloadB64  = SHA256.toBase64(SHA256.utf8(payload));
  var hmac16      = computeHmac(payload);
  return 'FP-' + payloadB64 + '-' + hmac16;
}

// ── UI helpers ────────────────────────────────────────────────────────────────

function toggleExpiry() {
  var mode = document.getElementById('expiryMode').value;
  document.getElementById('expiryDate').style.display = (mode === 'date') ? 'block' : 'none';
}

function showError(msg) {
  var box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('visible');
  document.getElementById('resultBox').classList.remove('visible');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('visible');
}

function generate() {
  hideError();

  var machineId   = document.getElementById('machineId').value.trim();
  var licenseType = document.getElementById('licenseType').value;
  var expiryMode  = document.getElementById('expiryMode').value;
  var expiryDate  = document.getElementById('expiryDate').value.trim();

  if (!machineId)            { showError('Device ID is required.'); return; }
  if (machineId.length < 10) { showError('Device ID looks too short — copy it again from the Activation screen.'); return; }

  var expiry;
  if (expiryMode === 'permanent') {
    expiry = 'Permanent';
  } else {
    if (!expiryDate) { showError('Please pick an expiry date.'); return; }
    expiry = expiryDate; // YYYY-MM-DD from <input type="date">
  }

  var key = buildKey(machineId, licenseType, expiry);

  document.getElementById('keyOutput').value = key;
  document.getElementById('metaBox').innerHTML =
    'Device&nbsp;ID: <span>' + machineId + '</span><br>' +
    'Type: <span>' + licenseType + '</span> &nbsp;|&nbsp; Expiry: <span>' + expiry + '</span>';

  document.getElementById('resultBox').classList.add('visible');
  var copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = 'Copy';
  copyBtn.classList.remove('copied');
}

function copyKey() {
  var key = document.getElementById('keyOutput').value;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(key).then(markCopied).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }
}

function fallbackCopy() {
  var ta = document.getElementById('keyOutput');
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  markCopied();
}

function markCopied() {
  var btn = document.getElementById('copyBtn');
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON') generate();
});
</script>
</body>
</html>
